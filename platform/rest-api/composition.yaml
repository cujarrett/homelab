apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: xrestapi
spec:
  compositeTypeRef:
    apiVersion: platform.local.lab/v1alpha1
    kind: XRestApi
  mode: Pipeline
  pipeline:
    - step: create-resources
      # function-patch-and-transform handles all resource creation and patching.
      functionRef:
        name: function-patch-and-transform
      input:
        apiVersion: pt.fn.crossplane.io/v1beta1
        kind: Resources
        resources:
          - name: namespace
            base:
              apiVersion: v1
              kind: Namespace
              metadata:
                name: "" # Patched from spec.namespace
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.namespace
                toFieldPath: metadata.name
            readinessChecks:
              - type: None

          - name: deployment
            base:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                namespace: "" # Patched from spec.namespace
                labels:
                  app: rest-api
              spec:
                replicas: 1
                selector:
                  matchLabels:
                    app: rest-api
                template:
                  metadata:
                    labels:
                      app: rest-api
                  spec:
                    containers:
                      - name: api
                        image: placeholder # Patched by CombineFromComposite below
                        ports:
                          - containerPort: 8080
                        env:
                          # SERVICE_BINDING_ROOT tells the app where bindings are mounted.
                          # This follows the servicebinding.io spec — each subdirectory is
                          # a named binding, and files within it are the secret key/value pairs.
                          # We project the secrets directly here instead of using the
                          # servicebinding/runtime controller, achieving the same app experience.
                          - name: SERVICE_BINDING_ROOT
                            value: /bindings
                        volumeMounts:
                          - name: s3-binding
                            mountPath: /bindings/s3
                            readOnly: true
                          - name: elasticache-binding
                            mountPath: /bindings/elasticache
                            readOnly: true
                    volumes:
                      - name: s3-binding
                        secret:
                          secretName: "" # Patched to <xr-name>-s3 below
                      - name: elasticache-binding
                        secret:
                          secretName: "" # Patched to <xr-name>-elasticache below
            patches:
              # Build image from spec.goVersion directly — avoids the two-reconcile lag
              # of setting spec.image via go-templating (which writes to desired, not observed).
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.goVersion
                  strategy: string
                  string:
                    fmt: "public.ecr.aws/docker/library/golang:%s-alpine"
                toFieldPath: spec.template.spec.containers[0].image
              # Override image if spec.image is explicitly set in the XR.
              # Applies after the default above, so it wins when present.
              - type: FromCompositeFieldPath
                fromFieldPath: spec.image
                toFieldPath: spec.template.spec.containers[0].image
                policy:
                  fromFieldPath: Optional
              # Patch the S3 secret name into the volume
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: metadata.name
                  strategy: string
                  string:
                    fmt: "%s-s3"
                toFieldPath: spec.template.spec.volumes[0].secret.secretName
              # Patch the ElastiCache secret name into the volume
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: metadata.name
                  strategy: string
                  string:
                    fmt: "%s-elasticache"
                toFieldPath: spec.template.spec.volumes[1].secret.secretName
              # Patch the namespace from spec.namespace
              - type: FromCompositeFieldPath
                fromFieldPath: spec.namespace
                toFieldPath: metadata.namespace
            connectionDetails:
              - type: FromFieldPath
                name: image
                fromFieldPath: spec.template.spec.containers[0].image
            readinessChecks:
              - type: None

          - name: service
            # Exposes the Deployment via ClusterIP Service
            base:
              apiVersion: v1
              kind: Service
              metadata:
                namespace: "" # Patched from spec.namespace
                labels:
                  app: rest-api
              spec:
                selector:
                  app: rest-api
                ports:
                  - port: 80
                    targetPort: 8080
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.namespace
                toFieldPath: metadata.namespace

          - name: s3
            # SERVICE PROVIDER ROLE (servicebinding.io/service-provider):
            # Crossplane creates the S3 bucket and writes connection details into
            # a Secret named "<xr-name>-s3" in the claim namespace.
            base:
              apiVersion: s3.aws.upbound.io/v1beta2
              kind: Bucket
              spec:
                forProvider:
                  region: us-east-1
                writeConnectionSecretToRef:
                  name: ""
                  namespace: ""
            patches:
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: metadata.name
                  strategy: string
                  string:
                    fmt: "%s-s3"
                toFieldPath: spec.writeConnectionSecretToRef.name
              - type: FromCompositeFieldPath
                fromFieldPath: spec.namespace
                toFieldPath: spec.writeConnectionSecretToRef.namespace
            readinessChecks:
              - type: None

          - name: elasticache
            # SERVICE PROVIDER ROLE (servicebinding.io/service-provider):
            # Crossplane creates ElastiCache and writes connection details into
            # a Secret named "<xr-name>-elasticache" in the claim namespace.
            base:
              apiVersion: elasticache.aws.upbound.io/v1beta2
              kind: ReplicationGroup
              spec:
                forProvider:
                  region: us-east-1
                  description: "" # Patched from XR name below
                  nodeType: cache.t4g.micro
                  engine: redis
                  numCacheClusters: 1
                writeConnectionSecretToRef:
                  name: ""
                  namespace: ""
            patches:
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: metadata.name
                  strategy: string
                  string:
                    fmt: "%s-elasticache"
                toFieldPath: spec.forProvider.description
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: metadata.name
                  strategy: string
                  string:
                    fmt: "%s-elasticache"
                toFieldPath: spec.writeConnectionSecretToRef.name
              - type: FromCompositeFieldPath
                fromFieldPath: spec.namespace
                toFieldPath: spec.writeConnectionSecretToRef.namespace
            readinessChecks:
              - type: None

