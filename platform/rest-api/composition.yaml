apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: xrestapi
spec:
  compositeTypeRef:
    apiVersion: platform.local.lab/v1alpha1
    kind: XRestApi
  # Pipeline mode: functions run in order, each transforming the desired state.
  # function-go-templating builds the image string from goVersion first,
  # then function-patch-and-transform applies all patches and creates resources.
  mode: Pipeline
  pipeline:
    - step: set-image-from-go-version
      # function-go-templating renders Go templates against the XR fields.
      # Here it builds spec.image from spec.goVersion before patch-and-transform runs.
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{ if not .observed.composite.resource.spec.image }}
            apiVersion: platform.local.lab/v1alpha1
            kind: XRestApi
            metadata:
              name: {{ .observed.composite.resource.metadata.name }}
            spec:
              image: "public.ecr.aws/docker/library/golang:{{ .observed.composite.resource.spec.goVersion }}-alpine"
            {{ end }}

    - step: create-resources
      # function-patch-and-transform handles all resource creation and patching.
      functionRef:
        name: function-patch-and-transform
      input:
        apiVersion: pt.fn.crossplane.io/v1beta1
        kind: Resources
        resources:
          - name: deployment
            base:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                labels:
                  app: rest-api
              spec:
                replicas: 1
                selector:
                  matchLabels:
                    app: rest-api
                template:
                  metadata:
                    labels:
                      app: rest-api
                  spec:
                    containers:
                      - name: api
                        image: "" # Set by function-go-templating step above via spec.image patch
                        ports:
                          - containerPort: 8080
                        env:
                          # SERVICE_BINDING_ROOT tells the app where bindings are mounted.
                          # This follows the servicebinding.io spec — each subdirectory is
                          # a named binding, and files within it are the secret key/value pairs.
                          # We project the secrets directly here instead of using the
                          # servicebinding/runtime controller, achieving the same app experience.
                          - name: SERVICE_BINDING_ROOT
                            value: /bindings
                        volumeMounts:
                          - name: s3-binding
                            mountPath: /bindings/s3
                            readOnly: true
                          - name: elasticache-binding
                            mountPath: /bindings/elasticache
                            readOnly: true
                    volumes:
                      - name: s3-binding
                        secret:
                          secretName: "" # Patched to <xr-name>-s3 below
                      - name: elasticache-binding
                        secret:
                          secretName: "" # Patched to <xr-name>-elasticache below
            patches:
              # Patch the container image from spec.image (set by go-templating step)
              - type: FromCompositeFieldPath
                fromFieldPath: spec.image
                toFieldPath: spec.template.spec.containers[0].image
              # Patch the S3 secret name into the volume
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: metadata.name
                  strategy: string
                  string:
                    fmt: "%s-s3"
                toFieldPath: spec.template.spec.volumes[0].secret.secretName
              # Patch the ElastiCache secret name into the volume
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: metadata.name
                  strategy: string
                  string:
                    fmt: "%s-elasticache"
                toFieldPath: spec.template.spec.volumes[1].secret.secretName
            connectionDetails:
              - type: FromFieldPath
                name: image
                fromFieldPath: spec.template.spec.containers[0].image
            readinessChecks:
              - type: None

          - name: service
            # Exposes the Deployment via ClusterIP Service
            base:
              apiVersion: v1
              kind: Service
              metadata:
                labels:
                  app: rest-api
              spec:
                selector:
                  app: rest-api
                ports:
                  - port: 80
                    targetPort: 8080

          - name: s3
            # SERVICE PROVIDER ROLE (servicebinding.io/service-provider):
            # Crossplane creates the S3 bucket and writes connection details into
            # a Secret named "<xr-name>-s3" in the claim namespace.
            base:
              apiVersion: s3.aws.upbound.io/v1beta1
              kind: Bucket
              spec:
                forProvider:
                  locationConstraint: us-east-1
                writeConnectionSecretToRef:
                  name: ""
                  namespace: ""
            patches:
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: metadata.name
                  strategy: string
                  string:
                    fmt: "%s-s3"
                toFieldPath: spec.writeConnectionSecretToRef.name
              - type: FromCompositeFieldPath
                fromFieldPath: spec.claimRef.namespace
                toFieldPath: spec.writeConnectionSecretToRef.namespace
                policy:
                  fromFieldPath: Optional
            readinessChecks:
              - type: None

          - name: elasticache
            # SERVICE PROVIDER ROLE (servicebinding.io/service-provider):
            # Crossplane creates ElastiCache and writes connection details into
            # a Secret named "<xr-name>-elasticache" in the claim namespace.
            base:
              apiVersion: cache.aws.upbound.io/v1beta1
              kind: ReplicationGroup
              spec:
                forProvider:
                  region: us-east-1
                  cacheNodeType: cache.t4g.micro
                  engine: redis
                  numCacheClusters: 1
                writeConnectionSecretToRef:
                  name: ""
                  namespace: ""
            patches:
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: metadata.name
                  strategy: string
                  string:
                    fmt: "%s-elasticache"
                toFieldPath: spec.writeConnectionSecretToRef.name
              - type: FromCompositeFieldPath
                fromFieldPath: spec.claimRef.namespace
                toFieldPath: spec.writeConnectionSecretToRef.namespace
                policy:
                  fromFieldPath: Optional
            readinessChecks:
              - type: None

