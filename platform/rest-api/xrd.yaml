apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: xrestapis.platform.local.lab
spec:
  group: platform.local.lab
  names:
    kind: XRestApi
    plural: xrestapis
  claimNames:
    kind: RestApi
    plural: restapis
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                s3:
                  type: object
                  description: "S3 bucket options. If omitted, no bucket is created."
                  properties:
                    enabled:
                      type: boolean
                      default: false
                elasticache:
                  type: object
                  description: "ElastiCache options. If omitted, no cache is created."
                  properties:
                    enabled:
                      type: boolean
                      default: false
                goVersion:
                  type: string
                  description: "Go version for the REST API container image."
                  default: "1.22"
                image:
                  type: string
                  description: "Container image override. If not set, image is built from goVersion."
              # image is optional — if not set, the composition builds it from goVersion
          required: [spec]
