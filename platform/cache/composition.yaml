apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: xcache
spec:
  compositeTypeRef:
    apiVersion: platform.local.lab/v1alpha1
    kind: XCache
  mode: Pipeline
  pipeline:
    - step: create-cache
      functionRef:
        name: function-patch-and-transform
      input:
        apiVersion: pt.fn.crossplane.io/v1beta1
        kind: Resources
        resources:
          - name: replication-group
            # SERVICE PROVIDER ROLE (servicebinding.io/service-provider):
            # Provisions a Redis-compatible cache cluster and writes connection
            # details into a Secret. The type/provider files identify the protocol
            # (redis) and implementation (aws) per the servicebinding.io spec.
            base:
              apiVersion: elasticache.aws.upbound.io/v1beta2
              kind: ReplicationGroup
              spec:
                forProvider:
                  region: us-east-1     # Patched from spec.region
                  description: ""       # Patched from XR name
                  nodeType: cache.t4g.micro # Patched from spec.nodeType
                  engine: redis
                  numCacheClusters: 1
                writeConnectionSecretToRef:
                  name: ""      # Patched from spec.secretName
                  namespace: "" # Patched from spec.secretNamespace
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.region
                toFieldPath: spec.forProvider.region
              - type: FromCompositeFieldPath
                fromFieldPath: spec.nodeType
                toFieldPath: spec.forProvider.nodeType
              - type: FromCompositeFieldPath
                fromFieldPath: metadata.name
                toFieldPath: spec.forProvider.description
              - type: FromCompositeFieldPath
                fromFieldPath: spec.secretName
                toFieldPath: spec.writeConnectionSecretToRef.name
              - type: FromCompositeFieldPath
                fromFieldPath: spec.secretNamespace
                toFieldPath: spec.writeConnectionSecretToRef.namespace
            connectionDetails:
              - name: type
                value: redis
              - name: provider
                value: aws
              - type: FromConnectionSecretKey
                name: host
                fromConnectionSecretKey: host
              - type: FromConnectionSecretKey
                name: port
                fromConnectionSecretKey: port
              - type: FromConnectionSecretKey
                name: username
                fromConnectionSecretKey: username
              - type: FromConnectionSecretKey
                name: password
                fromConnectionSecretKey: password
