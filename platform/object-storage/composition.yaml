apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: xobjectstorage
spec:
  compositeTypeRef:
    apiVersion: platform.local.lab/v1alpha1
    kind: XObjectStorage
  mode: Pipeline
  pipeline:
    - step: render-resources
      # Creates the S3 bucket, an IAM user scoped to that bucket, an access key
      # for the user, and (once the bucket ARN is known) an inline user policy
      # granting least-privilege S3 access. All resources are managed together
      # so deleting the XR cleans up the IAM user and access key automatically.
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $xr := .observed.composite.resource }}
            {{- $name := $xr.metadata.name }}
            {{- $region := $xr.spec.region | default "us-east-1" }}
            {{- $bucketArn := "" }}
            {{- if .observed.resources }}
              {{- with index .observed.resources "bucket" }}
                {{- with .resource.status.atProvider }}
                  {{- $bucketArn = .arn | default "" }}
                {{- end }}
              {{- end }}
            {{- end }}
            ---
            # S3 bucket — external-name is left unset so Crossplane generates a
            # unique name from the managed resource name.
            apiVersion: s3.aws.upbound.io/v1beta2
            kind: Bucket
            metadata:
              name: {{ $name }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: bucket
            spec:
              forProvider:
                region: {{ $region }}
            ---
            # IAM user scoped to this XR — deleted with the XR.
            apiVersion: iam.aws.upbound.io/v1beta1
            kind: User
            metadata:
              name: {{ $name }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: iam-user
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              forProvider: {}
            ---
            # Access key for the IAM user. Credentials are written to a secret in
            # crossplane-system and bubbled up to the XR connection secret via the
            # PT step below.
            apiVersion: iam.aws.upbound.io/v1beta1
            kind: AccessKey
            metadata:
              name: {{ $name }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: access-key
            spec:
              forProvider:
                userSelector:
                  matchControllerRef: true
              writeConnectionSecretToRef:
                name: {{ $name }}-access-key
                namespace: crossplane-system
            {{- if $bucketArn }}
            ---
            # Inline user policy granting least-privilege access to this bucket only.
            # Only created once the bucket ARN is known (after bucket is provisioned).
            apiVersion: iam.aws.upbound.io/v1beta1
            kind: UserPolicy
            metadata:
              name: {{ $name }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: user-policy
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              forProvider:
                userSelector:
                  matchControllerRef: true
                policy: >-
                  {"Version":"2012-10-17","Statement":[{"Effect":"Allow","Action":["s3:GetObject","s3:PutObject","s3:DeleteObject","s3:ListBucket"],"Resource":["{{ $bucketArn }}","{{ $bucketArn }}/*"]}]}
            {{- end }}
    - step: bubble-connection-details
      # Declares which fields from each managed resource's connection secret
      # should be aggregated into the XR's connection secret. The XApi composition
      # sets writeConnectionSecretToRef on this XR, so all keys here end up
      # in the binding secret mounted by the API container.
      functionRef:
        name: function-patch-and-transform
      input:
        apiVersion: pt.fn.crossplane.io/v1beta1
        kind: Resources
        resources:
          - name: bucket
            base:
              apiVersion: s3.aws.upbound.io/v1beta2
              kind: Bucket
            connectionDetails:
              - type: FromValue
                name: type
                value: s3
              - type: FromValue
                name: provider
                value: aws
              - type: FromFieldPath
                name: bucket
                fromFieldPath: status.atProvider.id
              - type: FromFieldPath
                name: region
                fromFieldPath: spec.forProvider.region
          - name: access-key
            base:
              apiVersion: iam.aws.upbound.io/v1beta1
              kind: AccessKey
            connectionDetails:
              - type: FromConnectionSecretKey
                name: username
                fromConnectionSecretKey: attribute.id
              - type: FromConnectionSecretKey
                name: password
                fromConnectionSecretKey: attribute.secret

