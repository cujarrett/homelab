apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: xobjectstorage
spec:
  compositeTypeRef:
    apiVersion: platform.local.lab/v1alpha1
    kind: XObjectStorage
  mode: Pipeline
  pipeline:
    - step: render-aws-resources
      functionRef:
        name: function-patch-and-transform
      input:
        apiVersion: pt.fn.crossplane.io/v1beta1
        kind: Resources
        resources:
          - name: bucket
            base:
              apiVersion: s3.aws.upbound.io/v1beta2
              kind: Bucket
              spec:
                forProvider:
                  region: us-east-1 # placeholder — overwritten by patch below
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.region
                toFieldPath: spec.forProvider.region
            connectionDetails:
              - type: FromValue
                name: type
                value: s3
              - type: FromValue
                name: provider
                value: aws
              - type: FromFieldPath
                name: bucket
                fromFieldPath: status.atProvider.id
              - type: FromFieldPath
                name: region
                fromFieldPath: spec.forProvider.region

