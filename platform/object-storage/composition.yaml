apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: xobjectstorage
spec:
  compositeTypeRef:
    apiVersion: platform.local.lab/v1alpha1
    kind: XObjectStorage
  mode: Pipeline
  pipeline:
    - step: create-bucket
      functionRef:
        name: function-patch-and-transform
      input:
        apiVersion: pt.fn.crossplane.io/v1beta1
        kind: Resources
        resources:
          - name: bucket
            # SERVICE PROVIDER ROLE (servicebinding.io/service-provider):
            # Provisions an S3-compatible bucket and writes connection details into
            # a Secret. The type/provider files in the secret identify the protocol
            # (s3) and implementation (aws) per the servicebinding.io spec.
            base:
              apiVersion: s3.aws.upbound.io/v1beta2
              kind: Bucket
              spec:
                forProvider:
                  region: us-east-1 # Patched from spec.region
                writeConnectionSecretToRef:
                  name: ""      # Patched from spec.secretName
                  namespace: "" # Patched from spec.secretNamespace
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.region
                toFieldPath: spec.forProvider.region
              - type: FromCompositeFieldPath
                fromFieldPath: spec.secretName
                toFieldPath: spec.writeConnectionSecretToRef.name
              - type: FromCompositeFieldPath
                fromFieldPath: spec.secretNamespace
                toFieldPath: spec.writeConnectionSecretToRef.namespace
            connectionDetails:
              - type: Value
                name: type
                value: s3
              - type: Value
                name: provider
                value: aws
              - type: FromConnectionSecretKey
                name: region
                fromConnectionSecretKey: region
              - type: FromConnectionSecretKey
                name: bucket
                fromConnectionSecretKey: bucket
              - type: FromConnectionSecretKey
                name: uri
                fromConnectionSecretKey: endpoint
              - type: FromConnectionSecretKey
                name: username
                fromConnectionSecretKey: aws_access_key_id
              - type: FromConnectionSecretKey
                name: password
                fromConnectionSecretKey: aws_secret_access_key
