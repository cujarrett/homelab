apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: xobjectstorages.platform.local.lab
spec:
  group: platform.local.lab
  names:
    kind: XObjectStorage
    plural: xobjectstorages
  claimNames:
    kind: ObjectStorage
    plural: objectstorages
  connectionSecretKeys:
    - type
    - provider
    - uri
    - region
    - bucket
    - username
    - password
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                secretNamespace:
                  type: string
                  description: "Namespace to write the connection secret into."
                secretName:
                  type: string
                  description: "Name for the connection secret."
                region:
                  type: string
                  default: us-east-1
                  description: "Cloud region for the bucket."
              required: [secretNamespace, secretName]
          required: [spec]
