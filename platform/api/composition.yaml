apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: xapi
spec:
  compositeTypeRef:
    apiVersion: platform.local.lab/v1alpha1
    kind: XApi
  mode: Pipeline
  pipeline:
    - step: create-resources
      # function-patch-and-transform handles all resource creation and patching.
      functionRef:
        name: function-patch-and-transform
      input:
        apiVersion: pt.fn.crossplane.io/v1beta1
        kind: Resources
        resources:
          - name: namespace
            base:
              apiVersion: v1
              kind: Namespace
              metadata:
                name: "" # Patched from spec.namespace
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.namespace
                toFieldPath: metadata.name
            readinessChecks:
              - type: None

          - name: deployment
            base:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                namespace: "" # Patched from spec.namespace
                labels:
                  app: rest-api
              spec:
                replicas: 1
                selector:
                  matchLabels:
                    app: rest-api
                template:
                  metadata:
                    labels:
                      app: rest-api
                  spec:
                    containers:
                      - name: api
                        image: placeholder # Patched from spec.image
                        imagePullPolicy: Always
                        ports:
                          - containerPort: 8080 # Patched from spec.port
                        env:
                          # SERVICE_BINDING_ROOT tells the app where bindings are mounted.
                          # This follows the servicebinding.io spec — each subdirectory is
                          # a named binding, and files within it are the secret key/value pairs.
                          # We project the secrets directly here instead of using the
                          # servicebinding/runtime controller, achieving the same app experience.
                          - name: SERVICE_BINDING_ROOT
                            value: /bindings
                        volumeMounts:
                          - name: object-storage-binding
                            mountPath: /bindings/object-storage
                            readOnly: true
                          - name: cache-binding
                            mountPath: /bindings/cache
                            readOnly: true
                    volumes:
                      - name: object-storage-binding
                        secret:
                          secretName: "" # Patched to <xr-name>-object-storage below
                      - name: cache-binding
                        secret:
                          secretName: "" # Patched to <xr-name>-cache below
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.image
                toFieldPath: spec.template.spec.containers[0].image
              # Patch the object-storage secret name into the volume
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: metadata.name
                  strategy: string
                  string:
                    fmt: "%s-object-storage"
                toFieldPath: spec.template.spec.volumes[0].secret.secretName
              # Patch the cache secret name into the volume
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: metadata.name
                  strategy: string
                  string:
                    fmt: "%s-cache"
                toFieldPath: spec.template.spec.volumes[1].secret.secretName
              # Patch the namespace from spec.namespace
              - type: FromCompositeFieldPath
                fromFieldPath: spec.namespace
                toFieldPath: metadata.namespace
            connectionDetails:
              - type: FromFieldPath
                name: image
                fromFieldPath: spec.template.spec.containers[0].image
            readinessChecks:
              - type: None

          - name: service
            # Exposes the Deployment via ClusterIP Service
            base:
              apiVersion: v1
              kind: Service
              metadata:
                namespace: "" # Patched from spec.namespace
                labels:
                  app: rest-api
              spec:
                selector:
                  app: rest-api
                ports:
                  - port: 80
                    targetPort: 8080 # Patched from spec.port
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.namespace
                toFieldPath: metadata.namespace
              - type: FromCompositeFieldPath
                fromFieldPath: spec.port
                toFieldPath: spec.ports[0].targetPort
            readinessChecks:
              - type: None

          - name: object-storage
            # SERVICE PROVIDER ROLE (servicebinding.io/service-provider):
            # Crossplane creates the S3 bucket and writes connection details into
            # a Secret named "<xr-name>-object-storage" in the claim namespace.
            base:
              apiVersion: s3.aws.upbound.io/v1beta2
              kind: Bucket
              spec:
                forProvider:
                  region: us-east-1
                writeConnectionSecretToRef:
                  name: ""
                  namespace: ""
            patches:
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: metadata.name
                  strategy: string
                  string:
                    fmt: "%s-object-storage"
                toFieldPath: spec.writeConnectionSecretToRef.name
              - type: FromCompositeFieldPath
                fromFieldPath: spec.namespace
                toFieldPath: spec.writeConnectionSecretToRef.namespace
            readinessChecks:
              - type: None

          - name: cache
            # SERVICE PROVIDER ROLE (servicebinding.io/service-provider):
            # Crossplane creates ElastiCache and writes connection details into
            # a Secret named "<xr-name>-cache" in the claim namespace.
            base:
              apiVersion: elasticache.aws.upbound.io/v1beta2
              kind: ReplicationGroup
              spec:
                forProvider:
                  region: us-east-1
                  description: "" # Patched from XR name below
                  nodeType: cache.t4g.micro
                  engine: redis
                  numCacheClusters: 1
                writeConnectionSecretToRef:
                  name: ""
                  namespace: ""
            patches:
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: metadata.name
                  strategy: string
                  string:
                    fmt: "%s-cache"
                toFieldPath: spec.forProvider.description
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: metadata.name
                  strategy: string
                  string:
                    fmt: "%s-cache"
                toFieldPath: spec.writeConnectionSecretToRef.name
              - type: FromCompositeFieldPath
                fromFieldPath: spec.namespace
                toFieldPath: spec.writeConnectionSecretToRef.namespace
            readinessChecks:
              - type: None

          - name: argocd-application
            base:
              apiVersion: argoproj.io/v1alpha1
              kind: Application
              metadata:
                name: "" # Patched from XR metadata.name
                namespace: argocd
              spec:
                project: default
                source:
                  repoURL: "" # Patched from spec.argocd.repoURL
                  targetRevision: "" # Patched from spec.argocd.targetRevision
                  path: "" # Patched from spec.argocd.xrsPath
                  directory:
                    include: "" # Patched to <xr-name>.yaml
                destination:
                  server: https://kubernetes.default.svc
                  namespace: "" # Patched from spec.namespace
                syncPolicy:
                  automated:
                    prune: true
                    selfHeal: true
                  syncOptions:
                    - CreateNamespace=true
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: metadata.name
                toFieldPath: metadata.name
              - type: FromCompositeFieldPath
                fromFieldPath: spec.argocd.repoURL
                toFieldPath: spec.source.repoURL
              - type: FromCompositeFieldPath
                fromFieldPath: spec.argocd.targetRevision
                toFieldPath: spec.source.targetRevision
              - type: FromCompositeFieldPath
                fromFieldPath: spec.argocd.xrsPath
                toFieldPath: spec.source.path
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: metadata.name
                  strategy: string
                  string:
                    fmt: "%s.yaml"
                toFieldPath: spec.source.directory.include
              - type: FromCompositeFieldPath
                fromFieldPath: spec.namespace
                toFieldPath: spec.destination.namespace
            readinessChecks:
              - type: None
