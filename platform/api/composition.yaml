apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: xapi
spec:
  compositeTypeRef:
    apiVersion: platform.local.lab/v1alpha1
    kind: XApi
  mode: Pipeline
  pipeline:
    - step: render-all-resources
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $xr := .observed.composite.resource }}
            {{- $name := $xr.metadata.name }}
            {{- $ns := $name }}
            {{- $env := $xr.spec.parameters.environment | default "test" }}
            {{- /* `and` avoids nil-pointer if the key is absent */ -}}
            {{- $objectStorageEnabled := and $xr.spec.parameters.objectStorage $xr.spec.parameters.objectStorage.enabled }}
            {{- $cacheEnabled := and $xr.spec.parameters.cache $xr.spec.parameters.cache.enabled }}
            {{- $objStorageReady := "False" }}
            {{- $objStorageObserved := index (.observed.resources | default dict) "object-storage" }}
            {{- if $objStorageObserved }}
              {{- range ($objStorageObserved.resource.status.conditions | default list) }}
                {{- if and (eq .type "Ready") (eq .status "True") }}
                  {{- $objStorageReady = "True" }}
                {{- end }}
              {{- end }}
            {{- end }}
            {{- $cacheReady := "False" }}
            {{- $cacheObserved := index (.observed.resources | default dict) "cache" }}
            {{- if $cacheObserved }}
              {{- range ($cacheObserved.resource.status.conditions | default list) }}
                {{- if and (eq .type "Ready") (eq .status "True") }}
                  {{- $cacheReady = "True" }}
                {{- end }}
              {{- end }}
            {{- end }}
            {{- $host := $xr.spec.parameters.host | default "" }}
            {{- $tlsIssuer := $xr.spec.parameters.tlsIssuer | default "local-lab-ca-issuer" }}
            {{- $secretRefName := "" }}
            {{- if $xr.spec.parameters.secretRef }}{{- $secretRefName = $xr.spec.parameters.secretRef.name }}{{- end }}
            {{- $topicRefName := "" }}
            {{- if $xr.spec.parameters.topicRef }}{{- $topicRefName = $xr.spec.parameters.topicRef.name }}{{- end }}
            # --- Namespace ---
            apiVersion: v1
            kind: Namespace
            metadata:
              name: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: namespace
                gotemplating.fn.crossplane.io/ready: "True"
            ---
            # --- Service ---
            apiVersion: v1
            kind: Service
            metadata:
              name: {{ $name }}
              namespace: {{ $ns }}
              labels:
                app: xapi
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: service
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              selector:
                app: xapi
              ports:
                - name: http
                  port: 80
                  targetPort: {{ $xr.spec.parameters.port | default 8080 }}
                - name: metrics
                  port: 9090
                  targetPort: 9090
            ---
            # --- Deployment ---
            # Init containers poll for each binding's "type" file — last key written,
            # confirming all binding keys are available before the app starts.
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: {{ $name }}
              namespace: {{ $ns }}
              labels:
                app: xapi
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: deployment
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              replicas: 1
              selector:
                matchLabels:
                  app: xapi
              template:
                metadata:
                  labels:
                    app: xapi
                spec:
                  {{- if or $objectStorageEnabled $cacheEnabled }}
                  initContainers:
                    {{- if $objectStorageEnabled }}
                    - name: wait-for-object-storage-binding
                      image: busybox:1.36
                      command:
                        - sh
                        - -c
                        - "until [ -f /bindings/object-storage/type ]; do echo waiting for object-storage binding; sleep 5; done"
                      volumeMounts:
                        - name: object-storage-binding
                          mountPath: /bindings/object-storage
                          readOnly: true
                    {{- end }}
                    {{- if $cacheEnabled }}
                    - name: wait-for-cache-binding
                      image: busybox:1.36
                      command:
                        - sh
                        - -c
                        - "until [ -f /bindings/cache/type ]; do echo waiting for cache binding; sleep 5; done"
                      volumeMounts:
                        - name: cache-binding
                          mountPath: /bindings/cache
                          readOnly: true
                    {{- end }}
                  {{- end }}
                  containers:
                    - name: api
                      image: {{ $xr.spec.parameters.image }}
                      imagePullPolicy: Always
                      ports:
                        - containerPort: {{ $xr.spec.parameters.port | default 8080 }}
                      env:
                        # servicebinding.io convention: $SERVICE_BINDING_ROOT/<binding>/<key>
                        - name: SERVICE_BINDING_ROOT
                          value: /bindings
                      {{- if $topicRefName }}
                        # XTopic wiring: injected automatically from topicRef.
                        # App reads NATS_URL + NATS_STREAM to publish events.
                        - name: NATS_URL
                          value: "nats://nats.nats.svc.cluster.local:4222"
                        - name: NATS_STREAM
                          value: {{ $topicRefName | upper | quote }}
                      {{- end }}
                      {{- if $secretRefName }}
                      envFrom:
                        - secretRef:
                            name: {{ $secretRefName }}
                      {{- end }}
                      {{- if or $objectStorageEnabled $cacheEnabled }}
                      volumeMounts:
                        {{- if $objectStorageEnabled }}
                        - name: object-storage-binding
                          mountPath: /bindings/object-storage
                          readOnly: true
                        {{- end }}
                        {{- if $cacheEnabled }}
                        - name: cache-binding
                          mountPath: /bindings/cache
                          readOnly: true
                        {{- end }}
                      {{- end }}
                  {{- if or $objectStorageEnabled $cacheEnabled }}
                  volumes:
                    {{- if $objectStorageEnabled }}
                    # optional: true avoids pod failure before the secret exists
                    - name: object-storage-binding
                      secret:
                        secretName: {{ $name }}-object-storage
                        optional: true
                    {{- end }}
                    {{- if $cacheEnabled }}
                    - name: cache-binding
                      secret:
                        secretName: {{ $name }}-cache
                        optional: true
                    {{- end }}
                  {{- end }}
            {{- if $objectStorageEnabled }}
            ---
            apiVersion: platform.local.lab/v1alpha1
            kind: XObjectStorage
            metadata:
              name: {{ $name }}-object-storage
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: object-storage
                gotemplating.fn.crossplane.io/ready: {{ $objStorageReady | quote }}
            spec:
              parameters:
                environment: {{ $env }}
            {{- end }}
            {{- if $cacheEnabled }}
            ---
            apiVersion: platform.local.lab/v1alpha1
            kind: XCache
            metadata:
              name: {{ $name }}-cache
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: cache
                gotemplating.fn.crossplane.io/ready: {{ $cacheReady | quote }}
            spec:
              parameters:
                environment: {{ $env }}
            {{- end }}
            ---
            # release: monitoring matches the Prometheus operator's serviceMonitorSelector
            apiVersion: monitoring.coreos.com/v1
            kind: ServiceMonitor
            metadata:
              name: {{ $name }}
              namespace: {{ $ns }}
              labels:
                release: monitoring
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: servicemonitor
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              selector:
                matchLabels:
                  app: xapi
              endpoints:
                - port: metrics
                  path: /metrics
                  interval: 60s
            {{- if $host }}
            ---
            # tlsIssuer: local-lab-ca-issuer for .local.lab; letsencrypt-prod for public hosts
            apiVersion: networking.k8s.io/v1
            kind: Ingress
            metadata:
              name: {{ $name }}
              namespace: {{ $ns }}
              annotations:
                traefik.ingress.kubernetes.io/router.entrypoints: websecure
                traefik.ingress.kubernetes.io/router.tls: "true"
                cert-manager.io/cluster-issuer: {{ $tlsIssuer }}
                gotemplating.fn.crossplane.io/composition-resource-name: ingress
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              ingressClassName: traefik
              tls:
                - hosts:
                    - {{ $host }}
                  secretName: {{ $name }}-tls
              rules:
                - host: {{ $host }}
                  http:
                    paths:
                      - path: /
                        pathType: Prefix
                        backend:
                          service:
                            name: {{ $name }}
                            port:
                              number: 80
            {{- end }}
