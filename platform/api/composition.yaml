apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: xapi
spec:
  compositeTypeRef:
    apiVersion: platform.local.lab/v1alpha1
    kind: XApi
  mode: Pipeline
  pipeline:
    - step: render-all-resources
      # function-go-templating generates all resources. Deployment uses conditional
      # init containers and volumes for optional object storage and cache bindings.
      # XObjectStorage and XCache are reusable platform primitives — their compositions
      # handle cloud-specific resource creation independently of XApi.
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $xr := .observed.composite.resource }}
            {{- $name := $xr.metadata.name }}
            {{- $ns := $xr.spec.namespace }}
            {{- $objectStorageEnabled := and $xr.spec.objectStorage $xr.spec.objectStorage.enabled }}
            {{- $cacheEnabled := and $xr.spec.cache $xr.spec.cache.enabled }}
            {{- $host := $xr.spec.host | default "" }}
            {{- $tlsIssuer := $xr.spec.tlsIssuer | default "local-lab-ca-issuer" }}
            {{- $secretRefName := "" }}
            {{- if $xr.spec.secretRef }}{{- $secretRefName = $xr.spec.secretRef.name }}{{- end }}
            # --- Namespace ---
            apiVersion: v1
            kind: Namespace
            metadata:
              name: {{ $ns }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: namespace
                gotemplating.fn.crossplane.io/ready: "True"
            ---
            # --- Service ---
            # Exposes the Deployment via ClusterIP Service.
            apiVersion: v1
            kind: Service
            metadata:
              name: {{ $name }}
              namespace: {{ $ns }}
              labels:
                app: rest-api
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: service
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              selector:
                app: rest-api
              ports:
                - name: http
                  port: 80
                  targetPort: {{ $xr.spec.port | default 8080 }}
                - name: metrics
                  port: 9090
                  targetPort: 9090
            ---
            # --- Deployment ---
            # Init containers block the API container from starting until each enabled
            # binding's secret is populated, ensuring infrastructure dependencies are
            # fully ready before the app receives traffic.
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: {{ $name }}
              namespace: {{ $ns }}
              labels:
                app: rest-api
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: deployment
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              replicas: 1
              selector:
                matchLabels:
                  app: rest-api
              template:
                metadata:
                  labels:
                    app: rest-api
                spec:
                  {{- if or $objectStorageEnabled $cacheEnabled }}
                  initContainers:
                    {{- if $objectStorageEnabled }}
                    - name: wait-for-object-storage-binding
                      image: busybox:1.36
                      command:
                        - sh
                        - -c
                        - "until [ -f /bindings/object-storage/type ]; do echo waiting for object-storage binding; sleep 5; done"
                      volumeMounts:
                        - name: object-storage-binding
                          mountPath: /bindings/object-storage
                          readOnly: true
                    {{- end }}
                    {{- if $cacheEnabled }}
                    - name: wait-for-cache-binding
                      image: busybox:1.36
                      command:
                        - sh
                        - -c
                        - "until [ -f /bindings/cache/type ]; do echo waiting for cache binding; sleep 5; done"
                      volumeMounts:
                        - name: cache-binding
                          mountPath: /bindings/cache
                          readOnly: true
                    {{- end }}
                  {{- end }}
                  containers:
                    - name: api
                      image: {{ $xr.spec.image }}
                      imagePullPolicy: Always
                      ports:
                        - containerPort: {{ $xr.spec.port | default 8080 }}
                      env:
                        - name: SERVICE_BINDING_ROOT
                          value: /bindings
                      {{- if $secretRefName }}
                      envFrom:
                        - secretRef:
                            name: {{ $secretRefName }}
                      {{- end }}
                      {{- if or $objectStorageEnabled $cacheEnabled }}
                      volumeMounts:
                        {{- if $objectStorageEnabled }}
                        - name: object-storage-binding
                          mountPath: /bindings/object-storage
                          readOnly: true
                        {{- end }}
                        {{- if $cacheEnabled }}
                        - name: cache-binding
                          mountPath: /bindings/cache
                          readOnly: true
                        {{- end }}
                      {{- end }}
                  {{- if or $objectStorageEnabled $cacheEnabled }}
                  volumes:
                    {{- if $objectStorageEnabled }}
                    - name: object-storage-binding
                      secret:
                        secretName: {{ $name }}-object-storage
                        optional: true
                    {{- end }}
                    {{- if $cacheEnabled }}
                    - name: cache-binding
                      secret:
                        secretName: {{ $name }}-cache
                        optional: true
                    {{- end }}
                  {{- end }}
            {{- if $objectStorageEnabled }}
            ---
            # Delegates to the XObjectStorage platform primitive.
            apiVersion: platform.local.lab/v1alpha1
            kind: XObjectStorage
            metadata:
              name: {{ $name }}-object-storage
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: object-storage
            spec:
              writeConnectionSecretToRef:
                name: {{ $name }}-object-storage
                namespace: {{ $ns }}
            {{- end }}
            {{- if $cacheEnabled }}
            ---
            # Delegates to the XCache platform primitive.
            apiVersion: platform.local.lab/v1alpha1
            kind: XCache
            metadata:
              name: {{ $name }}-cache
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: cache
            spec:
              secretName: {{ $name }}-cache
              secretNamespace: {{ $ns }}
            {{- end }}
            ---
            apiVersion: monitoring.coreos.com/v1
            kind: ServiceMonitor
            metadata:
              name: {{ $name }}
              namespace: {{ $ns }}
              labels:
                release: monitoring
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: servicemonitor
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              selector:
                matchLabels:
                  app: rest-api
              endpoints:
                - port: metrics
                  path: /metrics
                  interval: 60s
            {{- if $host }}
            ---
            apiVersion: networking.k8s.io/v1
            kind: Ingress
            metadata:
              name: {{ $name }}
              namespace: {{ $ns }}
              annotations:
                traefik.ingress.kubernetes.io/router.entrypoints: websecure
                traefik.ingress.kubernetes.io/router.tls: "true"
                cert-manager.io/cluster-issuer: {{ $tlsIssuer }}
                gotemplating.fn.crossplane.io/composition-resource-name: ingress
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              ingressClassName: traefik
              tls:
                - hosts:
                    - {{ $host }}
                  secretName: {{ $name }}-tls
              rules:
                - host: {{ $host }}
                  http:
                    paths:
                      - path: /
                        pathType: Prefix
                        backend:
                          service:
                            name: {{ $name }}
                            port:
                              number: 80
            {{- end }}
