apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: spa-composition
spec:
  compositeTypeRef:
    apiVersion: platform.local.lab/v1alpha1
    kind: XSpa
  mode: Pipeline
  pipeline:
    - step: render-all-resources
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $name := .observed.composite.resource.metadata.name }}
            {{- $params := .observed.composite.resource.spec.parameters }}
            {{- $namespace := $params.namespace }}
            # --- Namespace ---
            apiVersion: v1
            kind: Namespace
            metadata:
              name: {{ $namespace }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: namespace
                gotemplating.fn.crossplane.io/ready: "True"
            ---
            # --- nginx ConfigMap ---
            # CSP header and health check path injected from XR parameters.
            apiVersion: v1
            kind: ConfigMap
            metadata:
              name: {{ $name }}-nginx-config
              namespace: {{ $namespace }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: nginx-config
                gotemplating.fn.crossplane.io/ready: "True"
            data:
              default.conf: |
                server {
                    listen 80;
                    server_tokens off;
                    add_header Content-Security-Policy "{{ $params.contentSecurityPolicy }}" always;
                    add_header X-Content-Type-Options "nosniff";
                    add_header Referrer-Policy "strict-origin-when-cross-origin";

                    root /usr/share/nginx/html;
                    index index.html;

                    location {{ $params.healthCheckPath }} {
                        access_log off;
                        return 200 'ok';
                        add_header Content-Type text/plain;
                    }

                    location = /index.html {
                        add_header Cache-Control "no-cache";
                    }

                    location ~* \.(js|css|woff2|png|jpg|jpeg|gif|ico|svg|woff)$ {
                        add_header Cache-Control "public, max-age=31536000, immutable";
                    }

                    # Block common credential/config file probes before the SPA catch-all.
                    # Without this, try_files serves index.html (200) for every .env scan.
                    location ~* (\.env|\.git|\.htaccess|\.htpasswd|wp-config\.php|phpinfo\.php|settings\.py|settings\.json|settings\.yaml|config\.json|config\.php|web\.config|composer\.(json|lock)|package(-lock)?\.json|yarn\.lock|Dockerfile|docker-compose\.yml|\.DS_Store|readme\.md|README\.md)$ {
                        return 404;
                    }

                    location ~* \.(php|asp|aspx|jsp|cgi|sh|py|rb|pl)$ {
                        return 404;
                    }

                    location / {
                        try_files $uri $uri/ /index.html;
                    }
                }
            ---
            # --- Deployment ---
            # Runs the SPA image (nginx + pre-built dist/) and mounts the nginx ConfigMap
            # so SPA routing and headers are applied without baking them into the image.
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: {{ $name }}
              namespace: {{ $namespace }}
              labels:
                app: spa
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: deployment
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              replicas: {{ $params.replicas | default 1 }}
              selector:
                matchLabels:
                  app: spa
                  instance: {{ $name }}
              template:
                metadata:
                  labels:
                    app: spa
                    instance: {{ $name }}
                spec:
                  {{- if $params.imagePullSecret }}
                  imagePullSecrets:
                    - name: {{ $params.imagePullSecret }}
                  {{- end }}
                  containers:
                    - name: spa
                      image: {{ $params.image }}
                      imagePullPolicy: Always
                      ports:
                        - containerPort: 80
                      resources:
                        requests:
                          cpu: {{ $params.cpuRequest | default "50m" }}
                          memory: {{ $params.memoryRequest | default "32Mi" }}
                        limits:
                          cpu: {{ $params.cpuLimit | default "200m" }}
                          memory: {{ $params.memoryLimit | default "64Mi" }}
                      readinessProbe:
                        httpGet:
                          path: {{ $params.healthCheckPath | default "/healthz" }}
                          port: 80
                        initialDelaySeconds: 5
                        periodSeconds: 10
                      volumeMounts:
                        - name: nginx-config
                          mountPath: /etc/nginx/conf.d/default.conf
                          subPath: default.conf
                          readOnly: true
                  volumes:
                    - name: nginx-config
                      configMap:
                        name: {{ $name }}-nginx-config
            ---
            # --- Service ---
            apiVersion: v1
            kind: Service
            metadata:
              name: {{ $name }}
              namespace: {{ $namespace }}
              labels:
                app: spa
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: service
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              selector:
                app: spa
                instance: {{ $name }}
              ports:
                - port: 80
                  targetPort: 80
            ---
            # --- Ingress ---
            # Traefik websecure entrypoint with TLS termination via cert-manager.
            # tlsIssuer selects between local-lab-ca-issuer (.local.lab) and
            # letsencrypt-prod (public hosts routed via Cloudflare Tunnel).
            apiVersion: networking.k8s.io/v1
            kind: Ingress
            metadata:
              name: {{ $name }}
              namespace: {{ $namespace }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: ingress
                gotemplating.fn.crossplane.io/ready: "True"
                traefik.ingress.kubernetes.io/router.entrypoints: websecure
                traefik.ingress.kubernetes.io/router.tls: "true"
                cert-manager.io/cluster-issuer: {{ $params.tlsIssuer | default "local-lab-ca-issuer" }}
            spec:
              ingressClassName: traefik
              tls:
                - hosts:
                    - {{ $params.host }}
                  secretName: {{ $name }}-tls
              rules:
                - host: {{ $params.host }}
                  http:
                    paths:
                      - path: /
                        pathType: Prefix
                        backend:
                          service:
                            name: {{ $name }}
                            port:
                              number: 80
