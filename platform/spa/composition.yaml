apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: spa-composition
spec:
  revisionHistoryLimit: 5
  compositeTypeRef:
    apiVersion: platform.local.lab/v1alpha1
    kind: XSpa
  mode: Pipeline
  pipeline:
    - step: render-all-resources
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $name := .observed.composite.resource.metadata.name }}
            {{- $params := .observed.composite.resource.spec.parameters }}
            {{- $namespace := $name }}
            {{- $apiProxyEnabled := and $params.apiProxy $params.apiProxy.enabled }}
            # --- Namespace ---
            apiVersion: v1
            kind: Namespace
            metadata:
              name: {{ $namespace }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: namespace
                gotemplating.fn.crossplane.io/ready: "True"
            ---
            # --- nginx ConfigMap ---
            # Generated from XR params so the SPA image stays generic across instances.
            apiVersion: v1
            kind: ConfigMap
            metadata:
              name: {{ $name }}-nginx-config
              namespace: {{ $namespace }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: nginx-config
                gotemplating.fn.crossplane.io/ready: "True"
            data:
              default.conf: |
                server {
                    listen 80;
                    server_tokens off;
                    add_header Content-Security-Policy "{{ $params.contentSecurityPolicy }}" always;
                    add_header X-Content-Type-Options "nosniff";
                    add_header X-Frame-Options "SAMEORIGIN";
                    add_header X-XSS-Protection "1; mode=block";
                    add_header Referrer-Policy "strict-origin-when-cross-origin";

                    root /usr/share/nginx/html;
                    index index.html;

                    location {{ $params.healthCheckPath }} {
                        access_log off;
                        return 200 'ok';
                        add_header Content-Type text/plain;
                    }

                    # no-cache: browser always refetches the entry point
                    location = /index.html {
                        add_header Cache-Control "no-cache";
                    }

                    # immutable: hashed filenames change on each build
                    location ~* \.(js|css|woff2|png|jpg|jpeg|gif|ico|svg|woff)$ {
                        add_header Cache-Control "public, max-age=31536000, immutable";
                    }

                    # Block credential/config probes before the catch-all.
                    # Without these, try_files returns 200 for every .env scan.
                    location ~* /\.git(/|$) {
                        return 404;
                    }

                    location ~* /\.vscode(/|$) {
                        return 404;
                    }

                    location ~* (^|/)\.env[^/]* {
                        return 404;
                    }

                    location ~* (\.htaccess|\.htpasswd|\.gitconfig|\.DS_Store|wp-config\.php|phpinfo\.php|settings\.py|settings\.json|settings\.yaml|config\.json|config\.php|config\.yaml|config\.rb|web\.config|composer\.(json|lock)|package(-lock)?\.json|yarn\.lock|Dockerfile|docker-compose\.yml|readme\.md|README\.md|wlwmanifest\.xml|xmlrpc\.php)$ {
                        return 404;
                    }

                    location ~* (^|/)(\.aws|credentials|api-keys\.txt|logs/error\.log|var/log/)(/|$) {
                        return 404;
                    }

                    location ~* \.(log)$ {
                        return 404;
                    }

                    location ~* \.(php|php5|php7|php8|phtml|asp|aspx|jsp|cgi|sh|py|rb|pl)$ {
                        return 404;
                    }

                    # Endpoint/framework probes (Spring Boot, Symfony, Magento, etc.)
                    location ~* (^/actuator(/|$)|^/swagger(/|$)|^/openapi(/|$)|^/v2/_catalog(/|$)|^/v3/api-docs(/|$)|^/console(/|$)|^/telescope(/|$)|^/server-status$|^/_profiler(/|$)|^/_environment(/|$)|^/rest/(V[0-9]+|default)(/|$)) {
                        return 404;
                    }

                    # Config/secret file probes not covered above
                    location ~* (application\.(yml|yaml|properties)|appsettings(\.[^.]+)?\.json|terraform\.tfstate(\.backup)?|serverless\.yml|connectionstrings\.config|\.composer/) {
                        return 404;
                    }

                    {{- if $apiProxyEnabled }}
                    # API proxy: routes /api/ to in-cluster service (no public exposure needed)
                    location /api/ {
                        proxy_pass http://{{ $params.apiProxy.upstream }}/;
                        proxy_set_header Host $host;
                        proxy_set_header X-Real-IP $remote_addr;
                        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                        proxy_set_header X-Forwarded-Proto $scheme;
                    }
                    {{- end }}

                    # SPA catch-all: client-side router handles unmatched paths
                    location / {
                        try_files $uri $uri/ /index.html;
                    }
                }
            ---
            # --- Deployment ---
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: {{ $name }}
              namespace: {{ $namespace }}
              labels:
                app: spa
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: deployment
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              replicas: {{ $params.replicas | default 1 }}
              selector:
                matchLabels:
                  app: spa
                  instance: {{ $name }}
              template:
                metadata:
                  labels:
                    app: spa
                    instance: {{ $name }}
                spec:
                  {{- if $params.imagePullSecret }}
                  imagePullSecrets:
                    - name: {{ $params.imagePullSecret }}
                  {{- end }}
                  containers:
                    - name: spa
                      image: {{ $params.image }}
                      imagePullPolicy: Always
                      ports:
                        - containerPort: 80
                      resources:
                        requests:
                          cpu: {{ $params.cpuRequest | default "50m" }}
                          memory: {{ $params.memoryRequest | default "32Mi" }}
                        limits:
                          cpu: {{ $params.cpuLimit | default "200m" }}
                          memory: {{ $params.memoryLimit | default "64Mi" }}
                      readinessProbe:
                        httpGet:
                          path: {{ $params.healthCheckPath | default "/healthz" }}
                          port: 80
                        initialDelaySeconds: 5
                        periodSeconds: 10
                      volumeMounts:
                        - name: nginx-config
                          mountPath: /etc/nginx/conf.d/default.conf
                          subPath: default.conf
                          readOnly: true
                  volumes:
                    - name: nginx-config
                      configMap:
                        name: {{ $name }}-nginx-config
            ---
            # --- Service ---
            apiVersion: v1
            kind: Service
            metadata:
              name: {{ $name }}
              namespace: {{ $namespace }}
              labels:
                app: spa
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: service
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              selector:
                app: spa
                instance: {{ $name }}
              ports:
                - port: 80
                  targetPort: 80
            ---
            # --- Ingress ---
            # tlsIssuer: local-lab-ca-issuer for .local.lab; letsencrypt-prod for public hosts
            apiVersion: networking.k8s.io/v1
            kind: Ingress
            metadata:
              name: {{ $name }}
              namespace: {{ $namespace }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: ingress
                gotemplating.fn.crossplane.io/ready: "True"
                traefik.ingress.kubernetes.io/router.entrypoints: websecure
                traefik.ingress.kubernetes.io/router.tls: "true"
                cert-manager.io/cluster-issuer: {{ $params.tlsIssuer | default "local-lab-ca-issuer" }}
            spec:
              ingressClassName: traefik
              tls:
                - hosts:
                    - {{ $params.host }}
                  secretName: {{ $name }}-tls
              rules:
                - host: {{ $params.host }}
                  http:
                    paths:
                      - path: /
                        pathType: Prefix
                        backend:
                          service:
                            name: {{ $name }}
                            port:
                              number: 80
