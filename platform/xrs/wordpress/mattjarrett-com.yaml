apiVersion: platform.local.lab/v1alpha1
kind: XWordPressPlatform
metadata:
  name: mattjarrett-com
  namespace: mattjarrett-com
spec:
  parameters:
    host: mattjarrett.com
    storageSize: "10Gi"
    dbStorageSize: "1Gi"
    replicas: 1
    cpuRequest: "250m"
    cpuLimit: "1500m"
    memoryRequest: "512Mi"
    memoryLimit: "1024Mi"
    dataRetention: retain
    argocd:
      repoURL: https://github.com/cujarrett/homelab.git
      targetRevision: main
      xrsPath: platform/xrs/wordpress
