apiVersion: platform.local.lab/v1alpha1
kind: XSpa
metadata:
  name: my-vinyl
spec:
  parameters:
    image: ghcr.io/cujarrett/my-vinyl:main
    host: myvinyl.mattjarrett.dev
    tlsIssuer: letsencrypt-prod
    contentSecurityPolicy: "default-src 'self'; connect-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://i.discogs.com; frame-ancestors 'none'; base-uri 'self';"
    healthCheckPath: /healthz
    replicas: 1
    apiProxy:
      enabled: true
      upstream: my-vinyl-api.my-vinyl-api.svc.cluster.local
    cpuRequest: "50m"
    cpuLimit: "200m"
    memoryRequest: "64Mi"
    memoryLimit: "128Mi"
