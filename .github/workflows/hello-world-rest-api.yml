name: hello-world-rest-api

on:
  push:
    branches: [main]
    paths:
      - "apps/hello-world-rest-api/**"
      - ".github/workflows/hello-world-rest-api.yml"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: apps/hello-world-rest-api
          platforms: linux/arm64
          push: true
          tags: ghcr.io/cujarrett/hello-world-rest-api:latest
