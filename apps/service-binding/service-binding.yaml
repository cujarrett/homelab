apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: service-binding
  namespace: argocd
spec:
  project: default
  source:
    # servicebinding/runtime is the reference implementation of the
    # Service Binding Specification for Kubernetes (servicebinding.io).
    # It installs the ServiceBinding CRD and its controller, which:
    #   1. Watches ServiceBinding resources
    #   2. Mounts the referenced Secret as a volume into the workload pod
    #   3. Sets SERVICE_BINDING_ROOT on the container so the app knows where to find bindings
    #
    # We point to our own repo rather than servicebinding/runtime directly because
    # config/default uses ko:// image placeholders that only resolve at build time.
    # Our install/kustomization.yaml references the pre-built release manifest instead.
    repoURL: https://github.com/cujarrett/homelab.git
    targetRevision: main
    path: apps/service-binding/install
  destination:
    server: https://kubernetes.default.svc
    namespace: service-binding
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
