apiVersion: v1
kind: Namespace
metadata:
  name: web
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mattjarrett-dev
  namespace: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mattjarrett-dev
  template:
    metadata:
      labels:
        app: mattjarrett-dev
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: web
          image: ghcr.io/cujarrett/mattjarrett.com:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: mattjarrett-dev
  namespace: web
spec:
  selector:
    app: mattjarrett-dev
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mattjarrett-dev
  namespace: web
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - mattjarrett.dev
      secretName: mattjarrett-dev-tls
  rules:
    - host: mattjarrett.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mattjarrett-dev
                port:
                  number: 80
