apiVersion: v1
kind: Namespace
metadata:
  name: web
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mattjarrett-dev-nginx-config
  namespace: web
data:
  default.conf: |
    server {
        listen 80;
        server_tokens off;
        add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; script-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self';" always;

        root /usr/share/nginx/html;
        index index.html;

        location /healthz {
            access_log off;
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        location = /index.html {
            add_header Cache-Control "no-cache";
        }

        location ~* \.(js|css|woff2)$ {
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mattjarrett-dev
  namespace: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mattjarrett-dev
  template:
    metadata:
      labels:
        app: mattjarrett-dev
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: web
          image: ghcr.io/cujarrett/mattjarrett.dev:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: nginx-config
          configMap:
            name: mattjarrett-dev-nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: mattjarrett-dev
  namespace: web
spec:
  selector:
    app: mattjarrett-dev
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mattjarrett-dev
  namespace: web
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - mattjarrett.dev
      secretName: mattjarrett-dev-tls
  rules:
    - host: mattjarrett.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mattjarrett-dev
                port:
                  number: 80
