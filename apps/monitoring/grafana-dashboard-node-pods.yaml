          },
          "pluginVersion": "12.4.2",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "(1 - node_memory_MemAvailable_bytes{instance=~\"192.168.10.100:.*\"} / node_memory_MemTotal_bytes{instance=~\"192.168.10.100:.*\"}) * 100",
              "legendFormat": "Memory %",
              "refId": "A"
            }
          ],
          "title": "ctrl-1 — Memory %",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "description": "Pod CPU — stacked area drill-down. Sum of pod cores will be less than total node CPU; the gap is OS and kernel work.",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "axisColorMode": "text",
                "axisLabel": "cores",
