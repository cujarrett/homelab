          },
          "pluginVersion": "12.4.2",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum by(pod) (\n  rate(container_cpu_usage_seconds_total{container!=\"POD\", container!=\"\", pod=~\".+\"}[5m])\n  * on(namespace, pod) group_left(node)\n  kube_pod_info{node=\"ctrl-1\"}\n)",
