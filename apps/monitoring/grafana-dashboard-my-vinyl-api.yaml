apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-my-vinyl-api
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  my-vinyl-api.json: |-
    {
      "title": "my-vinyl-api",
      "uid": "my-vinyl-api",
      "editable": true,
      "graphTooltip": 1,
      "time": { "from": "now-24h", "to": "now" },
      "timepicker": {},
      "refresh": "5m",
      "schemaVersion": 38,
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Collection Size",
          "description": "Number of records in the Discogs collection.",
          "gridPos": { "x": 0, "y": 0, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "none",
            "graphMode": "none",
            "textMode": "value_and_name",
            "justifyMode": "center"
          },
          "fieldConfig": {
            "defaults": { "unit": "short", "decimals": 0 }
          },
          "targets": [
            {
              "expr": "discogs_collection_size{namespace=\"my-vinyl\"}",
              "legendFormat": "records",
              "instant": true
            }
          ]
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Total Requests (window)",
          "description": "Total requests to my-vinyl-api in the selected time window.",
          "gridPos": { "x": 6, "y": 0, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "options": {
            "reduceOptions": { "calcs": ["sum"] },
            "colorMode": "none",
            "graphMode": "none",
            "textMode": "value_and_name",
            "justifyMode": "center"
          },
          "fieldConfig": {
            "defaults": { "unit": "short", "decimals": 0 }
          },
          "targets": [
            {
              "expr": "sum(increase(http_requests_total{namespace=\"my-vinyl\"}[$__range]))",
              "legendFormat": "requests",
              "instant": true
            }
          ]
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Success Rate",
          "description": "Percentage of requests returning HTTP 2xx. Below 99% = yellow, below 90% = red. Based on last 5 minutes.",
          "gridPos": { "x": 12, "y": 0, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "auto",
            "justifyMode": "center"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "decimals": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 0.9 },
                  { "color": "green", "value": 0.99 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{namespace=\"my-vinyl\",status_code=~\"2..\"}[5m])) / sum(rate(http_requests_total{namespace=\"my-vinyl\"}[5m]))",
              "legendFormat": "Success Rate",
              "instant": true
            }
          ]
        },
        {
          "id": 4,
          "type": "stat",
          "title": "P99 Latency",
          "description": "99th percentile request latency over the last 5 minutes.",
          "gridPos": { "x": 18, "y": 0, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "auto",
            "justifyMode": "center"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "decimals": 2,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "red", "value": 3 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{namespace=\"my-vinyl\"}[5m])) by (le))",
              "legendFormat": "p99",
              "instant": true
            }
          ]
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "Requests per Minute by Path",
          "description": "Request rate per path over time.",
          "gridPos": { "x": 0, "y": 4, "w": 24, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "decimals": 2,
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 15,
                "lineInterpolation": "smooth"
              }
            }
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{namespace=\"my-vinyl\"}[5m])) by (path)",
              "legendFormat": "{{path}}"
            }
          ]
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "P50 / P95 / P99 Latency",
          "description": "Request latency percentiles over time.",
          "gridPos": { "x": 0, "y": 12, "w": 24, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "decimals": 3,
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 10,
                "lineInterpolation": "smooth"
              }
            }
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(http_request_duration_seconds_bucket{namespace=\"my-vinyl\"}[5m])) by (le))",
              "legendFormat": "p50"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{namespace=\"my-vinyl\"}[5m])) by (le))",
              "legendFormat": "p95"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{namespace=\"my-vinyl\"}[5m])) by (le))",
              "legendFormat": "p99"
            }
          ]
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "Error Rate",
          "description": "Rate of non-2xx responses over time.",
          "gridPos": { "x": 0, "y": 20, "w": 24, "h": 6 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "decimals": 3,
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 20,
                "lineInterpolation": "smooth"
              },
              "color": { "fixedColor": "red", "mode": "fixed" }
            }
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{namespace=\"my-vinyl\",status_code!~\"2..\"}[5m])) by (status_code, path)",
              "legendFormat": "{{status_code}} {{path}}"
            }
          ]
        }
      ]
    }
