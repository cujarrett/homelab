apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 83.4.0
    helm:
      releaseName: monitoring
      values: |
        alertmanager:
          alertmanagerSpec:
            nodeSelector:
              node-role.kubernetes.io/worker: worker
            storage:
              volumeClaimTemplate:
                spec:
                  resources:
                    requests:
                      storage: 5Gi
        grafana:
          nodeSelector:
            node-role.kubernetes.io/worker: worker
          deploymentStrategy:
            type: Recreate
          admin:
            existingSecret: grafana-admin-secret
            userKey: admin-user
            passwordKey: admin-password
          grafana.ini:
            auth:
              anonymous:
                enabled: true
                org_role: Viewer
            auth.anonymous:
              enabled: true
              org_role: Viewer
          persistence:
            enabled: true
            size: 5Gi
          additionalDataSources:
            - name: Loki
              type: loki
              url: http://loki.monitoring.svc.cluster.local:3100
              access: proxy
              isDefault: false
          resources:
            requests:
              memory: 128Mi
            limits:
              memory: 384Mi
          sidecar:
            dashboards:
              enabled: true
              searchNamespace: ALL
          ingress:
            enabled: false
        prometheus:
          prometheusSpec:
            nodeSelector:
              node-role.kubernetes.io/worker: worker
            retention: 30d
            scrapeInterval: "60s"
            evaluationInterval: "60s"
            resources:
              requests:
                memory: 512Mi
              limits:
                memory: 1500Mi
            # Drop high-cardinality kubelet/cAdvisor metrics unused in homelab dashboards
            additionalScrapeConfigs: []
            kubelet:
              serviceMonitor:
                cAdvisorMetricRelabelings:
                  # Drop per-CPU-core breakdown (keep aggregate)
                  - sourceLabels: [__name__, cpu]
                    regex: "container_cpu_usage_seconds_total;cpu[0-9]+"
                    action: drop
                  # Drop noisy/unused cAdvisor metrics
                  - sourceLabels: [__name__]
                    regex: "container_blkio_device_usage_total|container_tasks_state|container_memory_failures_total|container_network_tcp_usage_total|container_network_udp_usage_total|container_cpu_cfs_throttled_periods_total|container_cpu_cfs_periods_total|container_file_descriptors|container_last_seen|container_start_time_seconds|container_spec_.*|container_threads.*"
                    action: drop
                metricRelabelings:
                  - sourceLabels: [__name__]
                    regex: "kubelet_runtime_operations_duration_seconds_bucket|kubelet_cgroup_manager_duration_seconds_bucket|kubelet_pod_worker_duration_seconds_bucket|kubelet_node_config_error|kubelet_pleg_relist_duration_seconds_bucket|rest_client_request_duration_seconds_bucket|storage_operation_duration_seconds_bucket"
                    action: drop
            kubeApiServer:
              serviceMonitor:
                metricRelabelings:
                  # Drop high-cardinality apiserver histogram buckets
                  - sourceLabels: [__name__]
                    regex: "apiserver_request_duration_seconds_bucket|apiserver_response_sizes_bucket|apiserver_watch_events_sizes_bucket|etcd_request_duration_seconds_bucket|apiserver_storage_list_fetched_objects_total|apiserver_storage_list_evaluated_objects_total|apiserver_storage_db_compaction_.*"
                    action: drop
            storageSpec:
              volumeClaimTemplate:
                spec:
                  resources:
                    requests:
                      storage: 20Gi
          ingress:
            enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    automated:
      prune: true
      selfHeal: true
