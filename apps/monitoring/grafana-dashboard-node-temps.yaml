              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 60 },
                  { "color": "red", "value": 75 }
                ]
              },
              "unit": "celsius"
            },
            "overrides": []
