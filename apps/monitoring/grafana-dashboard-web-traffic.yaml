apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-web-traffic
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  web-traffic.json: |-
    {
      "title": "Web Traffic",
      "uid": "web-traffic",
      "editable": true,
      "graphTooltip": 1,
      "time": { "from": "now-24h", "to": "now" },
      "timepicker": {},
      "refresh": "5m",
      "schemaVersion": 38,
      "templating": {
        "list": [
          {
            "current": { "selected": true, "text": "All", "value": ".*" },
            "hide": 0,
            "includeAll": false,
            "label": "HTTP Code",
            "multi": false,
            "name": "status_code",
            "options": [
              { "selected": true, "text": "All", "value": ".*" },
              { "selected": false, "text": "2xx Success", "value": "2.." },
              { "selected": false, "text": "3xx Redirect", "value": "3.." },
              { "selected": false, "text": "4xx Client Error", "value": "4.." },
              { "selected": false, "text": "5xx Server Error", "value": "5.." }
            ],
            "query": "All : .*, 2xx Success : 2.., 3xx Redirect : 3.., 4xx Client Error : 4.., 5xx Server Error : 5..",
            "skipUrlSync": false,
            "type": "custom"
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "blog.mattjarrett.dev",
          "description": "Requests served by origin in the selected window. Each page load counts multiple requests (HTML + assets).",
          "gridPos": { "x": 0, "y": 0, "w": 12, "h": 5 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "options": {
            "reduceOptions": { "calcs": ["sum"] },
            "colorMode": "none",
            "graphMode": "none",
            "textMode": "value_and_name",
            "justifyMode": "center"
          },
          "fieldConfig": {
            "defaults": { "unit": "short", "decimals": 0 }
          },
          "targets": [
            {
              "expr": "sum(increase(traefik_service_requests_total{exported_service=~\"blog-ghost.*@kubernetes\",code=~\"$status_code\"}[$__range]))",
              "legendFormat": "requests",
              "instant": true
            }
          ]
        },
        {
          "id": 2,
          "type": "stat",
          "title": "mattjarrett.dev",
          "description": "Total requests served by Traefik in the selected window.",
          "gridPos": { "x": 12, "y": 0, "w": 12, "h": 5 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "options": {
            "reduceOptions": { "calcs": ["sum"] },
            "colorMode": "none",
            "graphMode": "none",
            "textMode": "value_and_name",
            "justifyMode": "center"
          },
          "fieldConfig": {
            "defaults": { "unit": "short", "decimals": 0 }
          },
          "targets": [
            {
              "expr": "sum(increase(traefik_service_requests_total{exported_service=~\"mattjarrett-dev-mattjarrett-dev.*@kubernetes\",code=~\"$status_code\"}[$__range]))",
              "legendFormat": "requests",
              "instant": true
            }
          ]
        },
        {
          "id": 4,
          "type": "timeseries",
          "title": "Requests per Hour",
          "description": "Each point shows how many requests were received in the previous 1-hour window. Refreshes every 5 minutes.",
          "gridPos": { "x": 0, "y": 5, "w": 24, "h": 9 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 15,
                "lineInterpolation": "smooth"
              }
            }
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            {
              "expr": "sum(increase(traefik_service_requests_total{exported_service=~\"blog-ghost.*@kubernetes\",code=~\"$status_code\"}[1h]))",
              "legendFormat": "blog.mattjarrett.dev"
            },
            {
              "expr": "sum(increase(traefik_service_requests_total{exported_service=~\"mattjarrett-dev-mattjarrett-dev.*@kubernetes\",code=~\"$status_code\"}[1h]))",
              "legendFormat": "mattjarrett.dev"
            }
          ]
        },
        {
          "id": 5,
          "type": "stat",
          "title": "blog.mattjarrett.dev — Success Rate",
          "description": "Percentage of requests returning HTTP 2xx. Below 99% = yellow, below 90% = red. Based on the last 5 minutes of traffic.",
          "gridPos": { "x": 0, "y": 14, "w": 12, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "auto",
            "justifyMode": "center"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "decimals": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 0.9 },
                  { "color": "green", "value": 0.99 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "sum(rate(traefik_service_requests_total{exported_service=~\"blog-ghost.*@kubernetes\",code=~\"2..\"}[5m])) / sum(rate(traefik_service_requests_total{exported_service=~\"blog-ghost.*@kubernetes\"}[5m]))",
              "legendFormat": "Success Rate",
              "instant": true
            }
          ]
        },
        {
          "id": 6,
          "type": "stat",
          "title": "mattjarrett.dev — Success Rate",
          "description": "Percentage of requests returning HTTP 2xx. Below 99% = yellow, below 90% = red. Based on the last 1 hour of traffic; shows 100% when no traffic.",
          "gridPos": { "x": 12, "y": 14, "w": 12, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "auto",
            "justifyMode": "center"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "decimals": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 0.9 },
                  { "color": "green", "value": 0.99 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "sum(rate(traefik_service_requests_total{exported_service=~\"mattjarrett-dev-mattjarrett-dev.*@kubernetes|web-mattjarrett-dev.*@kubernetes\",code=~\"2..\"}[1h])) / sum(rate(traefik_service_requests_total{exported_service=~\"mattjarrett-dev-mattjarrett-dev.*@kubernetes|web-mattjarrett-dev.*@kubernetes\"}[1h]) > 0)",
              "legendFormat": "Success Rate",
              "instant": true
            }
          ]
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "HTTP Status Code Breakdown",
          "description": "Requests per hour by HTTP status code class. 2xx = success, 3xx = redirect, 4xx = client errors / bots, 5xx = server errors. Always shows all classes regardless of the filter above.",
          "gridPos": { "x": 0, "y": 18, "w": 24, "h": 10 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "custom": { "lineWidth": 2, "fillOpacity": 8, "lineInterpolation": "smooth" }
            },
            "overrides": [
              { "matcher": { "id": "byName", "options": "blog 2xx" }, "properties": [{ "id": "color", "value": { "fixedColor": "blue", "mode": "fixed" } }] },
              { "matcher": { "id": "byName", "options": "blog 3xx" }, "properties": [{ "id": "color", "value": { "fixedColor": "light-blue", "mode": "fixed" } }] },
              { "matcher": { "id": "byName", "options": "blog 4xx" }, "properties": [{ "id": "color", "value": { "fixedColor": "orange", "mode": "fixed" } }, { "id": "custom.lineStyle", "value": { "dash": [10, 10], "fill": "dash" } }] },
              { "matcher": { "id": "byName", "options": "blog 5xx" }, "properties": [{ "id": "color", "value": { "fixedColor": "red", "mode": "fixed" } }] },
              { "matcher": { "id": "byName", "options": "mattjarrett.dev 2xx" }, "properties": [{ "id": "color", "value": { "fixedColor": "green", "mode": "fixed" } }] },
              { "matcher": { "id": "byName", "options": "mattjarrett.dev 3xx" }, "properties": [{ "id": "color", "value": { "fixedColor": "light-green", "mode": "fixed" } }] },
              { "matcher": { "id": "byName", "options": "mattjarrett.dev 4xx" }, "properties": [{ "id": "color", "value": { "fixedColor": "yellow", "mode": "fixed" } }, { "id": "custom.lineStyle", "value": { "dash": [10, 10], "fill": "dash" } }] },
              { "matcher": { "id": "byName", "options": "mattjarrett.dev 5xx" }, "properties": [{ "id": "color", "value": { "fixedColor": "dark-red", "mode": "fixed" } }] }
            ]
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            { "expr": "sum(increase(traefik_service_requests_total{exported_service=~\"blog-ghost.*@kubernetes\",code=~\"2..\"}[1h]))", "legendFormat": "blog 2xx", "refId": "A" },
            { "expr": "sum(increase(traefik_service_requests_total{exported_service=~\"blog-ghost.*@kubernetes\",code=~\"3..\"}[1h]))", "legendFormat": "blog 3xx", "refId": "B" },
            { "expr": "sum(increase(traefik_service_requests_total{exported_service=~\"blog-ghost.*@kubernetes\",code=~\"4..\"}[1h]))", "legendFormat": "blog 4xx", "refId": "C" },
            { "expr": "sum(increase(traefik_service_requests_total{exported_service=~\"blog-ghost.*@kubernetes\",code=~\"5..\"}[1h]))", "legendFormat": "blog 5xx", "refId": "D" },
            { "expr": "sum(increase(traefik_service_requests_total{exported_service=~\"mattjarrett-dev-mattjarrett-dev.*@kubernetes\",code=~\"2..\"}[1h]))", "legendFormat": "mattjarrett.dev 2xx", "refId": "E" },
            { "expr": "sum(increase(traefik_service_requests_total{exported_service=~\"mattjarrett-dev-mattjarrett-dev.*@kubernetes\",code=~\"3..\"}[1h]))", "legendFormat": "mattjarrett.dev 3xx", "refId": "F" },
            { "expr": "sum(increase(traefik_service_requests_total{exported_service=~\"mattjarrett-dev-mattjarrett-dev.*@kubernetes\",code=~\"4..\"}[1h]))", "legendFormat": "mattjarrett.dev 4xx", "refId": "G" },
            { "expr": "sum(increase(traefik_service_requests_total{exported_service=~\"mattjarrett-dev-mattjarrett-dev.*@kubernetes\",code=~\"5..\"}[1h]))", "legendFormat": "mattjarrett.dev 5xx", "refId": "H" }
          ]
        }
      ]
    }
