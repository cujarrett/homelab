apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-web-traffic
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  blog.json: |-
    {
      "title": "Web Traffic",
      "uid": "web-traffic",
      "editable": true,
      "graphTooltip": 1,
      "time": { "from": "now-7d", "to": "now" },
      "timepicker": {},
      "refresh": "5m",
      "schemaVersion": 38,
      "panels": [
        {
          "id": 10,
          "type": "row",
          "title": "All Sites",
          "gridPos": { "x": 0, "y": 0, "w": 24, "h": 1 },
          "collapsed": false
        },
        {
          "id": 1,
          "type": "stat",
          "title": "Total Requests (selected range)",
          "gridPos": { "x": 0, "y": 1, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "options": {
            "reduceOptions": { "calcs": ["sum"] },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto"
          },
          "targets": [
            {
              "expr": "increase(traefik_service_requests_total{service=~\"blog-ghost.*@kubernetes|web-mattjarrett-dev.*@kubernetes|mattjarrett-com-mattjarrett-com-wordpress.*@kubernetes\"}[$__range])",
              "legendFormat": "Requests",
              "instant": true
            }
          ]
        },
        {
          "id": 11,
          "type": "stat",
          "title": "blog.mattjarrett.dev (selected range)",
          "gridPos": { "x": 6, "y": 1, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "options": {
            "reduceOptions": { "calcs": ["sum"] },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto"
          },
          "targets": [
            {
              "expr": "increase(traefik_service_requests_total{service=~\"blog-ghost.*@kubernetes\"}[$__range])",
              "legendFormat": "blog.mattjarrett.dev",
              "instant": true
            }
          ]
        },
        {
          "id": 12,
          "type": "stat",
          "title": "mattjarrett.dev (selected range)",
          "gridPos": { "x": 12, "y": 1, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "options": {
            "reduceOptions": { "calcs": ["sum"] },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto"
          },
          "targets": [
            {
              "expr": "increase(traefik_service_requests_total{service=~\"web-mattjarrett-dev.*@kubernetes\"}[$__range])",
              "legendFormat": "mattjarrett.dev",
              "instant": true
            }
          ]
        },
        {
          "id": 13,
          "type": "stat",
          "title": "mattjarrett.com (selected range)",
          "gridPos": { "x": 18, "y": 1, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "options": {
            "reduceOptions": { "calcs": ["sum"] },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto"
          },
          "targets": [
            {
              "expr": "increase(traefik_service_requests_total{service=~\"mattjarrett-com-mattjarrett-com-wordpress.*@kubernetes\"}[$__range])",
              "legendFormat": "mattjarrett.com",
              "instant": true
            }
          ]
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "Requests per Second — All Sites",
          "gridPos": { "x": 0, "y": 5, "w": 24, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "lineWidth": 2, "fillOpacity": 10 }
            }
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          },
          "targets": [
            {
              "expr": "sum(rate(traefik_service_requests_total{service=~\"blog-ghost.*@kubernetes\"}[5m]))",
              "legendFormat": "blog.mattjarrett.dev"
            },
            {
              "expr": "sum(rate(traefik_service_requests_total{service=~\"web-mattjarrett-dev.*@kubernetes\"}[5m]))",
              "legendFormat": "mattjarrett.dev"
            },
            {
              "expr": "sum(rate(traefik_service_requests_total{service=~\"mattjarrett-com-mattjarrett-com-wordpress.*@kubernetes\"}[5m]))",
              "legendFormat": "mattjarrett.com"
            }
          ]
        },
        {
          "id": 20,
          "type": "row",
          "title": "blog.mattjarrett.dev",
          "gridPos": { "x": 0, "y": 13, "w": 24, "h": 1 },
          "collapsed": false
        },
        {
          "id": 3,
          "type": "stat",
          "title": "HTTP 2xx Rate",
          "gridPos": { "x": 0, "y": 14, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 0.9 },
                  { "color": "green", "value": 0.99 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "sum(rate(traefik_service_requests_total{service=~\"blog-ghost.*@kubernetes\",code=~\"2..\"}[5m])) / sum(rate(traefik_service_requests_total{service=~\"blog-ghost.*@kubernetes\"}[5m]))",
              "legendFormat": "2xx %",
              "instant": true
            }
          ]
        },
        {
          "id": 4,
          "type": "stat",
          "title": "HTTP 4xx / 5xx (5m)",
          "gridPos": { "x": 6, "y": 14, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "auto"
          },
          "targets": [
            {
              "expr": "sum(rate(traefik_service_requests_total{service=~\"blog-ghost.*@kubernetes\",code=~\"[45]..\"}[5m]))",
              "legendFormat": "Errors/s",
              "instant": true
            }
          ]
        },
        {
          "id": 21,
          "type": "timeseries",
          "title": "blog.mattjarrett.dev — Requests by Status",
          "gridPos": { "x": 0, "y": 18, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "lineWidth": 2, "fillOpacity": 10 }
            }
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          },
          "targets": [
            {
              "expr": "sum by (code) (rate(traefik_service_requests_total{service=~\"blog-ghost.*@kubernetes\"}[5m]))",
              "legendFormat": "HTTP {{code}}"
            }
          ]
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "blog.mattjarrett.dev — Latency (p50 / p95 / p99)",
          "gridPos": { "x": 12, "y": 18, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": { "lineWidth": 2, "fillOpacity": 5 }
            }
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(traefik_service_request_duration_seconds_bucket{service=~\"blog-ghost.*@kubernetes\"}[5m])) by (le))",
              "legendFormat": "p50"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(traefik_service_request_duration_seconds_bucket{service=~\"blog-ghost.*@kubernetes\"}[5m])) by (le))",
              "legendFormat": "p95"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(traefik_service_request_duration_seconds_bucket{service=~\"blog-ghost.*@kubernetes\"}[5m])) by (le))",
              "legendFormat": "p99"
            }
          ]
        },
