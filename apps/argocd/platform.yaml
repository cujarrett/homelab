apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-definitions
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/cujarrett/homelab.git
    targetRevision: main
    path: platform
    directory:
      recurse: true
      # Exclude the xrs/ directory — XR instances are managed by their own ArgoCD apps
      exclude: "xrs/**"
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
