# Update repoURL with your GitHub username before applying
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: k3s-lab
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/cujarrett/homelab.git
    targetRevision: main
    path: apps
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
