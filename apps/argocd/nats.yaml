apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nats
  namespace: argocd
spec:
  project: infrastructure
  sources:
    - repoURL: https://nats-io.github.io/k8s/helm/charts/
      chart: nats
      targetRevision: 2.12.6
      helm:
        releaseName: nats
        values: |
          config:
            cluster:
              enabled: true
              # 3 replicas — one per worker node (work-1, work-2, work-3)
              replicas: 3
            jetstream:
              enabled: true
              fileStore:
                enabled: true
                pvc:
                  size: 5Gi
                  storageClassName: longhorn
          promExporter:
            enabled: true
          # Pin pods to worker nodes, keep control plane clean
          podTemplate:
            merge:
              spec:
                nodeSelector:
                  node-role.kubernetes.io/worker: worker
    - repoURL: https://github.com/cujarrett/homelab.git
      targetRevision: main
      path: apps/nats
  destination:
    server: https://kubernetes.default.svc
    namespace: nats
  ignoreDifferences:
    # Kubernetes adds status.phase to volumeClaimTemplates at runtime.
    # The Helm chart doesn't include it, causing a perpetual OutOfSync loop.
    - group: apps
      kind: StatefulSet
      jsonPointers:
        - /spec/volumeClaimTemplates
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
