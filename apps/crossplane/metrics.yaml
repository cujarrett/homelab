# Exposes the Crossplane metrics port (8080) as a Service and tells Prometheus
# to scrape it. The metrics.enabled=true Helm flag adds port 8080 to the pod
# but does NOT create a Service — we do that here.
apiVersion: v1
kind: Service
metadata:
  name: crossplane-metrics
  namespace: crossplane-system
  labels:
    app: crossplane
    release: crossplane
spec:
  selector:
    app: crossplane
    release: crossplane
  ports:
    - name: metrics
      port: 8080
      targetPort: metrics
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: crossplane
  namespace: crossplane-system
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: crossplane
      release: crossplane
  namespaceSelector:
    matchNames:
      - crossplane-system
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: crossplane-alerts
  namespace: crossplane-system
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: crossplane.xr
      interval: 60s
      rules:
        # XR stuck not synced — Crossplane can't reconcile it (bad composition,
        # RBAC error, circuit breaker open, etc.)
        - alert: CrossplaneXRNotSynced
          expr: |
            crossplane_composite_resource_synced == 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Crossplane XR {{ $labels.name }} is not synced"
            description: >
              XR {{ $labels.kind }}/{{ $labels.name }} in group {{ $labels.group }}
              has had Synced=False for over 5 minutes. Crossplane cannot reconcile it.
              Check: kubectl describe xwordpressplatform {{ $labels.name }} -n {{ $labels.namespace }}

        # XR synced but not ready — composed resources created but unhealthy
        - alert: CrossplaneXRNotReady
          expr: |
            crossplane_composite_resource_ready == 0
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Crossplane XR {{ $labels.name }} is not ready"
            description: >
              XR {{ $labels.kind }}/{{ $labels.name }} has been Synced but not Ready
              for over 15 minutes. Some composed resources are unhealthy.
              Check: kubectl describe xwordpressplatform {{ $labels.name }} -n {{ $labels.namespace }}

        # Reconcile errors spiking — something is consistently failing
        - alert: CrossplaneReconcileErrors
          expr: |
            rate(controller_runtime_reconcile_errors_total{
              job="crossplane-metrics"
            }[5m]) > 0.1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Crossplane reconcile errors on controller {{ $labels.controller }}"
            description: >
              Controller {{ $labels.controller }} is producing > 0.1 errors/sec over
              the last 5 minutes. Check Crossplane logs:
              kubectl logs -n crossplane-system -l app=crossplane --tail=50
