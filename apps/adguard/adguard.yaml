apiVersion: v1
kind: Namespace
metadata:
  name: adguard
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: adguard-home
  namespace: adguard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: adguard-home
  template:
    metadata:
      labels:
        app: adguard-home
    spec:
      nodeSelector:
        kubernetes.io/hostname: ctrl-1   # hostPort 53 must be on a known IP
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      hostNetwork: false
      containers:
        - name: adguard-home
          image: adguard/adguardhome:v0.107.57
          ports:
            - containerPort: 53
              hostPort: 53
              protocol: UDP
              name: dns-udp
            - containerPort: 53
              hostPort: 53
              protocol: TCP
              name: dns-tcp
            - containerPort: 3000
              name: setup
            - containerPort: 80
              name: http
          volumeMounts:
            - name: work
              mountPath: /opt/adguardhome/work
            - name: conf
              mountPath: /opt/adguardhome/conf
      volumes:
        - name: work
          persistentVolumeClaim:
            claimName: adguard-work
        - name: conf
          persistentVolumeClaim:
            claimName: adguard-conf
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: adguard-work
  namespace: adguard
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: adguard-conf
  namespace: adguard
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn
  resources:
    requests:
      storage: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: adguard-home
  namespace: adguard
spec:
  selector:
    app: adguard-home
  ports:
    - port: 80
      targetPort: 80
      name: http
    - port: 3000
      targetPort: 3000
      name: setup
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: adguard-home
  namespace: adguard
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    cert-manager.io/cluster-issuer: local-lab-ca-issuer
spec:
  tls:
    - hosts:
        - adguard.local.lab
      secretName: adguard-local-lab-tls
  rules:
    - host: adguard.local.lab
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: adguard-home
                port:
                  number: 80
